<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .popup-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: white;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    .message.user {
      background: #667eea;
      color: white;
      margin-left: auto;
    }

    .message.assistant {
      background: #f0f0f0;
      color: #333;
    }

    .message.error {
      background: #ff4444;
      color: white;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-container {
      display: flex;
      gap: 8px;
    }

    #user-input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    #user-input:focus {
      border-color: #667eea;
    }

    #send-btn {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    #send-btn:hover {
      background: #5568d3;
    }

    .controls {
      padding: 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }

    .controls button {
      flex: 1;
      padding: 10px;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .controls button:hover {
      background: #e0e0e0;
    }

    footer {
      padding: 12px;
      text-align: center;
      background: #f9f9f9;
      border-top: 1px solid #e0e0e0;
    }

    .version {
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <header>
      <h1>🤖 AI Assistant</h1>
    </header>

    <main>
      <div class="chat-container">
        <div id="chat-messages" class="chat-messages">
          <div class="message assistant">
            <p>Hello! I'm your AI assistant. How can I help you today?</p>
          </div>
        </div>

        <div class="input-container">
          <input 
            type="text" 
            id="user-input" 
            placeholder="Ask me anything..."
            autocomplete="off"
          />
          <button id="send-btn">Send</button>
        </div>
      </div>

      <div class="controls">
        <button id="toggle-avatar-btn">Toggle Avatar</button>
        <button id="analyze-page-btn">Analyze Page</button>
      </div>
    </main>

    <footer>
      <p class="version">v0.1.0</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
